name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python

      - name: Sync lib version
        if: ${{ steps.release.outputs.pr != '' }}
        run: |
          # Checkout the PR branch
          PR_BRANCH=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.headBranchName')
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"

          # Extract version from pyproject.toml
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Detected version: $VERSION"

          # Update Cargo.toml
          CARGO_TOML="./Cargo.toml"
          sed "s/^version = .*/version = \"$VERSION\"/" "$CARGO_TOML" > tmp && mv tmp "$CARGO_TOML"

          # Update python version in __init__.py
          INIT_PY="./python/pyinputcapture/__init__.py"
          sed "s/__version__ = .*/__version__ = '$VERSION'/" "$INIT_PY" > tmp && mv tmp "$INIT_PY"

          # Amend the existing commit and force push
          if git diff --quiet "$CARGO_TOML" "$INIT_PY"; then
            echo "Already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$CARGO_TOML" "$INIT_PY"
            git commit --amend --no-edit
            git push --force origin "$PR_BRANCH"
          fi

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created
    uses: ./.github/workflows/ci.yml
    with:
      release: true

  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
          github-token: ${{ github.token }}
          run-id: ${{ needs.build.outputs.run_id }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
